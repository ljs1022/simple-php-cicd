services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: simple-php-app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "php-fpm", "-t"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - simple-php

  nginx:
    image: nginx:stable-alpine
    container_name: simple-php-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - simple-php

networks:
  simple-php:
    driver: bridge